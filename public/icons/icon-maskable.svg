<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Solid Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09050b" />
      <stop offset="50%" stop-color="#140a18" />
      <stop offset="100%" stop-color="#050207" />
    </linearGradient>
    
    <!-- Rose & Mask Gradient -->
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="50%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#be123c" />
    </linearGradient>

    <!-- Aura Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#be123c" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#be123c" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Solid Background (No rx, fills whole canvas for maskable) -->
  <rect width="512" height="512" fill="url(#bgGrad)" />

  <!-- Subtle glow -->
  <circle cx="256" cy="256" r="180" fill="url(#glow)" />

  <!-- Stylized Elegant Rose scaled down to be safely inside the 60% center safe-zone (radius ~150px) -->
  <g transform="translate(148, 140) scale(0.42)">
    <!-- Outer Petals / Heart shape -->
    <path d="M 256,400 C 130,280 80,180 80,100 C 80,40 130,0 190,0 C 230,0 256,30 256,30 C 256,30 282,0 322,0 C 382,0 432,40 432,100 C 432,180 382,280 256,400 Z" fill="none" stroke="url(#roseGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Inner Swirling Petals -->
    <path d="M 256,120 C 210,120 180,150 180,190 C 180,240 256,290 256,290 C 256,290 332,240 332,190 C 332,150 302,120 256,120 Z" fill="url(#roseGrad)" />
    
    <path d="M 256,70 C 200,70 140,110 140,180 C 140,250 256,330 256,330 C 256,330 372,250 372,180 C 372,110 312,70 256,70 Z" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="12" />

    <!-- Stem / Thorn lines -->
    <path d="M 256,390 L 256,480" stroke="url(#roseGrad)" stroke-width="18" stroke-linecap="round" />
  </g>
</svg>
